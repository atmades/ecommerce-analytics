name: CI — dbt tests on PR

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  dbt-ci:
    name: dbt compile and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-bigquery
        run: |
          pip install \
            "dbt-bigquery==1.8.0" \
            "dbt-core==1.8.0" \
            "google-cloud-bigquery>=3.0,<4.0" \
            "google-cloud-storage>=2.4,<3.0"

      - name: Write GCP service account key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa.json

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_analytics:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: dataset_staging
                keyfile: /tmp/gcp-sa.json
                location: US
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: dbt compile
        working-directory: dbt
        run: dbt compile

      - name: dbt test sources
        working-directory: dbt
        run: dbt test --select source:*

      - name: dbt run all models
        working-directory: dbt
        run: dbt run

      - name: dbt test all models
        working-directory: dbt
        run: dbt test